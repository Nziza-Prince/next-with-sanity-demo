# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: news-app-postgres
    environment:
      POSTGRES_DB: newsapp
      POSTGRES_USER: newsuser
      POSTGRES_PASSWORD: news_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    networks:
      - news-app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsuser -d newsapp"]
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: news-app
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://newsuser:news_password@postgres:5432/newsapp
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=your-secure-secret-key-here
      - NEXT_PUBLIC_SANITY_PROJECT_ID=qb1f3e81
      - NEXT_PUBLIC_SANITY_DATASET=production
      - NEXT_PUBLIC_SANITY_STUDIO_URL=https://practice-news-cms.sanity.studio/
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - news-app-network
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  news-app-network:
    driver: bridge